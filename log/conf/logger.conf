[loggers]
keys=root,dual

[logger_root]
level=DEBUG
handlers=console01

[logger_dual]
level=DEBUG
handlers=console01,file01
qualname=dual
propagate=0

###############################################
[handlers]
keys=console01,file01

[handler_console01]
class=StreamHandler
level=DEBUG
formatter=form01
args=(sys.stderr,)

[handler_file01]
class=FileHandler
level=INFO
formatter=form01
args=('../log/app.log', 'a')

###############################################
[formatters]
keys=form01

[formatter_form01]
format=%(asctime)s %(filename)s[line:%(lineno)d] %(levelname)s %(message)s
datefmt=%a, %d %b %Y %H:%M:%S
